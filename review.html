<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>오답 다시풀기 — Exam Hub</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <a id="back-link" href="#" class="btn ghost">← 메뉴</a>
    <h1 id="exam-title">오답 다시풀기</h1>
    <div class="spacer"></div>
    <button class="btn ghost" title="설정" onclick="openExamSettings()">⚙️</button>
    <span id="left-badge" class="badge">남은 0</span>
  </div>
</div>

<div class="container">
  <div id="empty-view" style="display:none;text-align:center;padding:60px 0;">
    <div style="font-size:60px;">🎉</div>
    <h2>오답이 없습니다</h2>
    <p class="muted">모든 오답을 마스터하셨거나 아직 안 풀어보셨습니다.</p>
    <a id="empty-link" href="#" class="btn primary">퀴즈로 가기</a>
  </div>
  <div id="intro" class="muted" style="margin-bottom:14px;display:none;">
    <label style="display:block;margin-bottom:8px;">
      <input type="checkbox" id="expand-mode" /> 범위 확장: 약점 토픽 + 전체 범위 포함 (다양한 학습)
    </label>
    <span id="mode-desc"></span>
  </div>
  <div id="list-view"></div>
</div>

<script src="assets/app.js?v=20260513b"></script>
<script>
(async () => {
  const examId = ExamHub.getExamIdFromUrl() || 'ai900';
  const exam = await ExamHub.getExam(examId);
  if (!exam) { document.body.innerHTML = '<div class="container"><p>존재하지 않는 시험입니다.</p></div>'; return; }
  document.documentElement.style.setProperty('--accent', exam.color);
  document.getElementById('exam-title').textContent = `${exam.emoji} ${exam.name} 오답 다시풀기`;
  document.getElementById('back-link').href = `exam.html?id=${examId}`;
  document.getElementById('empty-link').href = `quiz.html?id=${examId}`;

  const all = await ExamHub.loadQuestions(examId);
  const wrongIds = ExamHub.getWrongList(examId);
  const expandCheckbox = document.getElementById('expand-mode');
  const modeDesc = document.getElementById('mode-desc');

  let baseQs = [];
  function loadQuestions() {
    if (expandCheckbox.checked && wrongIds.length > 0) {
      // 범위 확장 모드: 오답 + 약점 + 전체 섞이기
      baseQs = ExamHub.buildPracticeSet(examId, all, exam, wrongIds, 20);
      modeDesc.textContent = `📚 오답(${Math.min(wrongIds.length, 10)}개) + 약점 토픽 + 전체 범위 혼합 (${baseQs.length}문제)`;
    } else {
      // 오답만 모드 (기본)
      baseQs = all.filter((q) => wrongIds.includes(q.id));
      modeDesc.textContent = wrongIds.length > 0 ? `❌ 오답만 (${wrongIds.length}문제)` : '';
    }
    refresh();
  }

  const intro = document.getElementById('intro');
  const empty = document.getElementById('empty-view');
  const listEl = document.getElementById('list-view');
  const leftBadge = document.getElementById('left-badge');

  function refresh() {
    const ids = ExamHub.getWrongList(examId);
    leftBadge.textContent = `남은 ${ids.length}`;
    if (baseQs.length === 0) {
      empty.style.display = '';
      intro.style.display = 'none';
      listEl.style.display = 'none';
    } else {
      empty.style.display = 'none';
      intro.style.display = '';
      listEl.style.display = '';
    }
  }

  if (wrongIds.length === 0) { refresh(); return; }

  expandCheckbox.addEventListener('change', () => {
    listEl.innerHTML = ''; // 기존 카드 삭제
    loadQuestions(); // 새로 로드
    // 카드들 다시 그리기 (아래 코드로)
    renderCards();
  });

  loadQuestions();

  // 카드 렌더링 — 펼치면 풀이 모드
  function renderCards() {
  baseQs.forEach((origQ, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.marginBottom = '10px';
    card.dataset.qid = origQ.id;

    let shuffled = ExamHub.shuffleOptions(origQ); // 카드 펼칠 때 매번 새로 셔플
    let submitted = false;
    let picked = null;

    function renderHeader(open) {
      return `
        <div style="display:flex;gap:8px;align-items:center;cursor:pointer;" data-toggle="1">
          <span class="badge bad">Q${i + 1}</span>
          <span class="badge dim">${ExamHub.escape(origQ.subject || origQ.domain || '')}</span>
          <div style="flex:1;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
            ${ExamHub.escape((origQ.question || '').slice(0, 80))}
          </div>
          <span class="muted">${open ? '▲' : '▼'}</span>
        </div>
      `;
    }

    function renderBody() {
      // 답 제출 전: 보기 클릭 가능, 정답 안 보임
      // 제출 후: 정답/오답 표시 + 4단 해설 + (정답이면 마스터하기, 오답이면 재시도)
      const optionsHtml = Object.entries(shuffled.options).map(([k, v]) => {
        let cls = 'option';
        if (submitted) {
          if (k === shuffled.answer) cls += ' correct';
          else if (k === picked) cls += ' wrong';
        } else if (picked === k) {
          cls += ' selected';
        }
        return `<button class="${cls}" data-key="${k}" ${submitted ? 'disabled' : ''}>
          <span class="opt-label">${k}</span> ${ExamHub.escape(v)}
        </button>`;
      }).join('');

      let footerHtml = '';
      if (!submitted) {
        footerHtml = `
          <div style="margin-top:12px;display:flex;gap:8px;">
            <button class="btn primary" data-act="submit" ${picked ? '' : 'disabled'}>답 제출</button>
            <button class="btn ghost" data-act="show-anyway">해설만 보기</button>
          </div>
        `;
      } else {
        const correct = picked === shuffled.answer;
        footerHtml = `
          <div style="margin-top:14px;">
            ${ExamHub.renderExplanation(origQ)}
          </div>
          <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
            ${correct
              ? `<button class="btn primary" data-act="master">✓ 마스터함 (목록에서 제거)</button>`
              : `<button class="btn" data-act="retry">↻ 다시 시도</button>`}
            <button class="btn ghost" data-act="next">건너뛰기</button>
          </div>
        `;
      }

      return `
        <div data-detail style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
          ${ExamHub.renderQuestionBody(origQ)}
          <div style="margin-top:14px;">${optionsHtml}</div>
          ${footerHtml}
        </div>
      `;
    }

    let isOpen = false;
    function paint() {
      card.innerHTML = renderHeader(isOpen) + (isOpen ? renderBody() : '');
      bind();
    }
    function bind() {
      card.querySelector('[data-toggle]')?.addEventListener('click', (e) => {
        if (e.target.closest('[data-detail]')) return; // body 클릭은 토글 안 함
        if (!isOpen) {
          // 카드 펼칠 때마다 새로 셔플 + 상태 리셋
          shuffled = ExamHub.shuffleOptions(origQ);
          submitted = false;
          picked = null;
        }
        isOpen = !isOpen;
        paint();
      });
      if (!isOpen) return;
      card.querySelectorAll('.option').forEach((b) => {
        b.addEventListener('click', () => {
          if (submitted) return;
          picked = b.dataset.key;
          paint();
        });
      });
      const submitBtn = card.querySelector('[data-act="submit"]');
      if (submitBtn) {
        submitBtn.addEventListener('click', () => {
          if (!picked) return;
          submitted = true;
          // 통계 기록 — 정답 시 stats에 반영, 다시풀이 성공 카운트
          const correct = picked === shuffled.answer;
          ExamHub.recordAnswer(examId, origQ, correct);
          paint();
        });
      }
      card.querySelector('[data-act="show-anyway"]')?.addEventListener('click', () => {
        // 해설만 보기 — 풀지 않고 학습만
        submitted = true;
        picked = null; // 정답 비교 X
        // 정답 자체로 처리하지 않고 해설만 보여주기 위해 picked=정답으로 fake
        picked = shuffled.answer;
        paint();
      });
      card.querySelector('[data-act="master"]')?.addEventListener('click', () => {
        ExamHub.removeWrong(examId, origQ.id);
        card.style.transition = 'opacity 0.3s';
        card.style.opacity = '0';
        setTimeout(() => { card.remove(); refresh(); }, 300);
      });
      card.querySelector('[data-act="retry"]')?.addEventListener('click', () => {
        // 셔플 다시 + 다시 풀기 모드
        shuffled = ExamHub.shuffleOptions(origQ);
        submitted = false;
        picked = null;
        paint();
      });
      card.querySelector('[data-act="next"]')?.addEventListener('click', () => {
        isOpen = false;
        paint();
        // 다음 펼친 카드 자동 열기
        const nextCard = card.nextElementSibling;
        if (nextCard) nextCard.querySelector('[data-toggle]')?.click();
      });
    }
    paint();
    listEl.appendChild(card);
  });
  } // renderCards 함수 끝

  renderCards();
})();
</script>
</body>
</html>
