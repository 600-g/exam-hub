<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Exam Hub — 자격증 시험 준비</title>
<link rel="stylesheet" href="assets/style.css" />
<style>
  .hero { text-align: center; padding: 28px 12px 8px; }
  .hero h1 { font-size: 28px; margin: 0 0 6px; letter-spacing: -0.5px; }
  .hero .sub { color: var(--text-dim); font-size: 14px; }
  .section-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--text-dim); text-transform: uppercase;
    margin: 28px 4px 10px;
  }
  .admin-card {
    display: flex; gap: 14px; align-items: center;
    padding: 14px 18px; border-radius: 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-left: 4px solid #7c3aed;
    cursor: pointer; text-decoration: none; color: var(--text);
    transition: all 0.15s;
  }
  .admin-card:hover { border-color: #7c3aed; transform: translateY(-1px); text-decoration: none; }
  .admin-card .emoji { font-size: 26px; }
  .admin-card .title { font-weight: 700; font-size: 15px; }
  .admin-card .desc { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
  .admin-card .chev { color: var(--text-dim); font-size: 20px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <h1>📚 Exam Hub</h1>
    <div class="spacer"></div>
    <button class="btn ghost" title="설정 — 테마·API 키" onclick="openExamSettings()">⚙️ 설정</button>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h1>자격증 시험 준비</h1>
    <div class="sub">AI-POT · SQLD · AI-900</div>
  </div>

  <div class="section-label">시험 선택</div>
  <div id="exam-list" class="grid cols-2"></div>

  <div class="section-label">관리</div>
  <div id="admin-list"></div>

  <hr style="margin-top:36px" />
  <p class="muted" style="text-align:center;font-size:12px;">
    💡 모든 데이터는 브라우저(localStorage)에 저장됩니다 · 서버 백엔드 없음 · GitHub Pages 배포
  </p>
</div>

<script src="assets/app.js?v=20260513b"></script>
<script>
(async () => {
  const meta = await ExamHub.loadExams();
  const wrap = document.getElementById('exam-list');
  if (!wrap) return;
  wrap.innerHTML = '';
  meta.exams.filter((e) => e.active !== false).forEach((e) => {
    const stats = ExamHub.getStats(e.id);
    const wrongCount = ExamHub.getWrongList(e.id).length;
    const rate = stats.totalAnswered ? Math.round((stats.totalCorrect / stats.totalAnswered) * 100) : null;
    const a = document.createElement('a');
    a.className = 'exam-card';
    a.href = `exam.html?id=${e.id}`;
    a.style.borderLeft = `4px solid ${e.color}`;
    a.innerHTML = `
      <div class="emoji">${e.emoji}</div>
      <div style="flex:1;min-width:0;">
        <h3>${ExamHub.escape(e.name)} <span class="muted" style="font-weight:normal;font-size:13px;">${ExamHub.escape(e.fullName)}</span></h3>
        <p>${ExamHub.escape(e.description)}</p>
        <div class="stat">
          <span>📝 ${e.totalQuestions}문항 · ${e.timeMinutes}분</span>
          <span>✅ 합격 ${e.passScore}/${e.maxScore}</span>
          ${rate != null ? `<span>📊 정답률 ${rate}%</span>` : ''}
          ${wrongCount > 0 ? `<span>❌ 오답 ${wrongCount}</span>` : ''}
        </div>
      </div>
    `;
    wrap.appendChild(a);
  });

  // 관리 카드 (시험별 admin 진입)
  const adminWrap = document.getElementById('admin-list');
  const firstExam = meta.exams.find((e) => e.active !== false);
  const adminId = firstExam ? firstExam.id : 'aipot';
  adminWrap.innerHTML = `
    <a class="admin-card" href="admin.html?id=${adminId}">
      <div class="emoji">✨</div>
      <div style="flex:1;">
        <div class="title">문제 편집 · AI 생성</div>
        <div class="desc">Gemini로 문제 자동 생성 + 미리보기·채택 · JSON 내보내기</div>
      </div>
      <div class="chev">›</div>
    </a>
  `;
})();
</script>
</body>
</html>
